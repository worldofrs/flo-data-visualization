<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
    <style>
        h1 {
            display: flex;
            justify-content: center;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-size: clamp(1.2rem, 4vw, 2rem);
            margin: 0.5em 0;
        }

        body {
            background-color: #a0d6cc;
            margin: 0;
        }

        .content {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #viz-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        #flower {
            width: 100%;
            max-width: 1400px;
            height: auto;
            display: block;
        }

        #tooltip {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 8px 12px;
            font-family: 'EB Garamond', serif;
            font-size: 13px;
            color: #222;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            max-width: 250px;
        }

        #tooltip strong {
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .scroll-hint {
            display: none;
            text-align: center;
            font-family: sans-serif;
            font-size: 13px;
            color: #005b56;
            padding: 6px 0;
            opacity: 0.8;
        }

        /* Mobile: < 600px */
        @media (max-width: 599px) {
            #viz-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            #flower {
                width: auto;
            }

            .scroll-hint {
                display: block;
            }

            #tooltip {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                top: auto;
                max-width: none;
                border-radius: 8px 8px 0 0;
                padding: 12px 16px;
                font-size: 14px;
                box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.15);
                text-align: center;
            }

            #tooltip strong {
                font-size: 15px;
            }
        }

        /* Tablet: 600–1023px */
        @media (min-width: 600px) and (max-width: 1023px) {
            #viz-container {
                overflow-x: visible;
            }
        }

        /* Desktop: 1024px+ */
        @media (min-width: 1024px) {
            #viz-container {
                overflow-x: visible;
            }
        }
    </style>
    <h1>Go with the Flo</h1>
    <div class="content">
        <div id="viz-container">
            <div class="scroll-hint">Swipe to explore &rarr;</div>
            <svg id="flower"></svg>
            <div id="tooltip"></div>
        </div>
    </div>
    <script src="d3/d3.v7.js"></script>
    <script src="script.js"></script>
</body>

</html>
